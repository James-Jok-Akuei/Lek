# Lëk — Render Blueprint (FREE tier for every service).
#
# IMPORTANT: this repo keeps the whole app inside the `lek/` subfolder, so each
# service uses `rootDir: lek/...`. If you ever push only the `lek/` folder as the
# repo root, move this file into `lek/` and drop the `lek/` prefix from rootDir.
#
# Secrets are marked `sync: false` — Render will prompt you for them in the
# dashboard instead of reading values from this file. Never commit real secrets.
#
# See DEPLOY.md for the full step-by-step guide (database init, keep-alive, etc.).

databases:
  - name: lek-db
    plan: free
    databaseName: lek
    user: lek

services:
  # ---------------------------------------------------------------- ML service
  - type: web
    name: lek-ml-service
    runtime: python
    plan: free
    rootDir: lek/ml-service
    # Serve-only deps (xgboost + sklearn/statsmodels/pandas, NO TensorFlow) so
    # the image fits the free tier's 512 MB more comfortably.
    buildCommand: pip install -r requirements-serve.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Browser origins allowed to call the ML service directly (optional — the
      # dashboard talks to the backend, not the ML service). Set to your
      # dashboard URL if you ever call it from the browser.
      - key: ALLOWED_ORIGINS
        sync: false

  # ------------------------------------------------------------------- Backend
  - type: web
    name: lek-backend
    runtime: node
    plan: free
    rootDir: lek/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Wired automatically from the Render database below (internal URL, no SSL).
      - key: DATABASE_URL
        fromDatabase:
          name: lek-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Run the monthly predict-then-alert cron in production.
      - key: SCHEDULER_ENABLED
        value: "true"
      # --- set these manually in the Render dashboard ---
      - key: JWT_SECRET
        sync: false
      # Deployed ML service URL, e.g. https://lek-ml-service.onrender.com
      - key: ML_SERVICE_URL
        sync: false
      # Deployed dashboard URL for CORS, e.g. https://lek-dashboard.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AFRICAS_TALKING_USERNAME
        sync: false
      - key: AFRICAS_TALKING_API_KEY
        sync: false
      - key: AFRICAS_TALKING_SHORTCODE
        sync: false
      # Used by `node scripts/seed.js` to create the first admin (username: admin).
      - key: ADMIN_INITIAL_PASSWORD
        sync: false

  # ----------------------------------------------------------------- Dashboard
  - type: web
    name: lek-dashboard
    runtime: static
    plan: free
    rootDir: lek/dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA fallback so client-side routes (react-router) resolve to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Baked in at build time. Set to your deployed backend URL + /api, e.g.
      # https://lek-backend.onrender.com/api
      - key: VITE_API_URL
        sync: false
